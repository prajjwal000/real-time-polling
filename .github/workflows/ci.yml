name: CI

on:
  push:
    branches: [master]

jobs:
  lint:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Lint Go
        uses: actions/setup-go@v5
        with:
          go-version: "1.26"
      - run: go vet ./...
        working-directory: backend

      - name: Lint Frontend
        working-directory: frontend
        run: |
          npm install -g pnpm
          pnpm install --frozen-lockfile
          pnpm lint
